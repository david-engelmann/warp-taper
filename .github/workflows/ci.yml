name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo nextest run --workspace

  coverage:
    name: coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # Hard floor: 85% core, 70% cli. The numbers are deliberately under
      # current actuals so a small future regression doesn't tank the
      # build, but a serious drop does. `--lib` scopes the measure to the
      # library's own lines (tests/*.rs harness code is excluded — it
      # doesn't represent product code).
      #
      # `captions.rs` and the CLI `run_caption` function are excluded
      # because the heavy lifting is a shell-out to ffmpeg; the
      # ffmpeg-success branches can't be reached in CI without
      # installing ffmpeg-full and a real input video. The early-exit
      # branches ARE covered by unit tests in captions.rs itself.
      - name: warp-taper-core ≥ 85% line coverage
        run: |
          cargo llvm-cov --lib --package warp-taper-core \
            --ignore-filename-regex 'captions\.rs' \
            --fail-under-lines 85
      - name: warp-taper-cli ≥ 60% line coverage
        run: cargo llvm-cov --package warp-taper-cli --fail-under-lines 60
